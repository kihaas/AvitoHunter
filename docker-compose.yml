version: '3.8'

services:
  avitohunter:
    build: .
    container_name: avitohunter
    restart: unless-stopped
    environment:
      - TELEGRAM_BOT_TOKEN=${TELEGRAM_BOT_TOKEN}
      - TELEGRAM_CHAT_ID=${TELEGRAM_CHAT_ID}
      - CHECK_INTERVAL_SECONDS=${CHECK_INTERVAL_SECONDS:-60}
      - AVITO_SEARCH_URLS=${AVITO_SEARCH_URLS}
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
    volumes:
      - ./data:/app/data  # для сохранения состояния/кэша
    networks:
      - avito_net

networks:
  avito_net:
    driver: bridge